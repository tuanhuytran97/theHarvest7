name: Auto Sync Stock Prices

on:
  schedule:
    # Chạy vào 15:00 giờ Việt Nam (UTC+7) -> 08:00 UTC (Vì GitHub Actions dùng múi giờ UTC)
    # Lịch này thiết lập từ Thứ 2 đến Thứ 6
    - cron: '0 8 * * 1-5'
  
  # Cho phép kích hoạt thủ công (Bấm nút trên GitHub hoặc ĐTDĐ)
  workflow_dispatch:

jobs:
  sync_prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests vnstock

      - name: Run Price Sync Script
        env:
          # Các biến bảo mật này sẽ được lấy từ GitHub Secrets của bạn
          WEB_APP_URL: ${{ secrets.WEB_APP_URL }}
          WEB_ADMIN_TOKEN: ${{ secrets.WEB_ADMIN_TOKEN }}
        run: |
          python sync_prices.py
